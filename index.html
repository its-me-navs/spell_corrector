<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spell Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #fff;
            color: #202124;
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .logo {
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 1.8rem;
            user-select: none;
        }

        .logo .b { color: #4285F4; }
        .logo .r { color: #EA4335; }
        .logo .a { color: #FBBC05; }
        .logo .i { color: #4285F4; }
        .logo .n { color: #34A853; }
        .logo .s { color: #EA4335; }

        .search-wrapper {
            width: 100%;
            max-width: 580px;
            margin-bottom: 1rem;
        }

        .search-bar {
            width: 100%;
            display: flex;
            align-items: center;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 0.6rem 1rem 0.6rem 1.2rem;
            gap: 0.75rem;
            transition: box-shadow 0.2s;
            background: #fff;
        }

        .search-bar:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }

        .search-icon { color: #9aa0a6; flex-shrink: 0; }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            font-family: 'Roboto', sans-serif;
            font-size: 1rem;
            color: #202124;
            resize: none;
            line-height: 1.5;
            background: transparent;
            min-height: 28px;
            max-height: 120px;
        }

        textarea::placeholder { color: #9aa0a6; }

        .clear-icon {
            color: #9aa0a6;
            cursor: pointer;
            flex-shrink: 0;
            display: none;
            padding: 2px;
            border-radius: 50%;
            transition: background 0.15s;
        }

        .clear-icon:hover { background: #f1f3f4; color: #202124; }
        .clear-icon.visible { display: block; }

        .buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        button {
            background: #f8f9fa;
            color: #3c4043;
            border: 1px solid #f8f9fa;
            padding: 0.55rem 1.1rem;
            border-radius: 4px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.875rem;
            cursor: pointer;
            transition: box-shadow 0.15s, border-color 0.15s;
        }

        button:hover {
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            border-color: #dadce0;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .result-area {
            width: 100%;
            max-width: 580px;
            margin-top: 1.5rem;
            display: none;
        }

        .result-area.visible {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .did-you-mean { font-size: 1rem; color: #202124; }

        .did-you-mean span {
            color: #1a0dab;
            font-style: italic;
            cursor: pointer;
        }

        .did-you-mean span:hover { text-decoration: underline; }

        .showing-results {
            font-size: 0.85rem;
            color: #70757a;
            margin-top: 0.4rem;
        }

        .loader {
            display: none;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .loader.visible { display: flex; }

        .spinner {
            width: 20px; height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #4285F4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            display: none;
            font-size: 0.85rem;
            color: #EA4335;
            text-align: center;
            margin-top: 1rem;
        }

        .footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #f2f2f2;
            border-top: 1px solid #e4e4e4;
            padding: 0.75rem 1.5rem;
            display: flex;
            gap: 1.5rem;
            font-size: 0.8rem;
            color: #70757a;
        }
    </style>
</head>
<body>

    <div class="logo">
        <span class="b">S</span><span class="r">p</span><span class="a">e</span><span class="i">l</span><span class="n">l</span><span class="s">r</span>
    </div>

    <div class="search-wrapper">
        <div class="search-bar">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <textarea id="input" rows="1" placeholder="Enter text to spell check..." oninput="handleInput()"></textarea>
            <svg class="clear-icon" id="clearIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" onclick="clearAll()">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
        </div>
    </div>

    <div class="buttons">
        <button id="correctBtn" onclick="correct()">Check Spelling</button>
        <button onclick="feelingLucky()">I'm Feeling Lucky</button>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="result-area" id="resultArea">
        <div class="did-you-mean">Corrected: <span id="output" onclick="useCorrection()"></span></div>
        <div class="showing-results">Showing results for the corrected text</div>
    </div>

    <div class="error-msg" id="errorMsg">Could not reach API. Is the server running on port 8000?</div>

    <div class="footer">
        <span>Norvig's noisy channel model</span>
        <span>Bigram language model</span>
        <span>Keyboard-aware channel probabilities</span>
    </div>

    <script>
        function handleInput() {
            const val = document.getElementById("input").value;
            document.getElementById("clearIcon").classList.toggle("visible", val.length > 0);
            document.getElementById("resultArea").classList.remove("visible");
            document.getElementById("errorMsg").style.display = "none";
            const ta = document.getElementById("input");
            ta.style.height = "auto";
            ta.style.height = ta.scrollHeight + "px";
        }

        async function correct() {
            const sentence = document.getElementById("input").value.trim();
            if (!sentence) return;

            const btn = document.getElementById("correctBtn");
            const loader = document.getElementById("loader");
            const resultArea = document.getElementById("resultArea");
            const errorMsg = document.getElementById("errorMsg");

            btn.disabled = true;
            loader.classList.add("visible");
            resultArea.classList.remove("visible");
            errorMsg.style.display = "none";

            try {
                const response = await fetch(`http://127.0.0.1:8000/correct?sentence=${encodeURIComponent(sentence)}`);
                const data = await response.json();
                document.getElementById("output").innerText = data.corrected;
                resultArea.classList.add("visible");
            } catch (e) {
                errorMsg.style.display = "block";
            } finally {
                btn.disabled = false;
                loader.classList.remove("visible");
            }
        }

        function feelingLucky() {
            const examples = [
                "thi sentance is foll of erors",
                "I recieve mansy leters fron my frinds",
                "she speled the wrods wrng",
                "the wheather is niec today"
            ];
            const pick = examples[Math.floor(Math.random() * examples.length)];
            document.getElementById("input").value = pick;
            handleInput();
            correct();
        }

        function useCorrection() {
            const corrected = document.getElementById("output").innerText;
            document.getElementById("input").value = corrected;
            handleInput();
            document.getElementById("resultArea").classList.remove("visible");
        }

        function clearAll() {
            document.getElementById("input").value = "";
            document.getElementById("clearIcon").classList.remove("visible");
            document.getElementById("resultArea").classList.remove("visible");
            document.getElementById("errorMsg").style.display = "none";
            document.getElementById("input").style.height = "auto";
        }

        document.getElementById("input").addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); correct(); }
        });
    </script>
</body>
</html>
